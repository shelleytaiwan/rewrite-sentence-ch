    .home-link { background:none; border:none; color:#636e72; font-size:15px; cursor:pointer; padding:6px 10px; border-radius:10px; }
    .home-link:hover { background:#f0f3f7; }
    #q-progress { color:#636e72; }
    .answer-area { min-height: 80px; background: #dfe6e9; border-radius: 20px; border: 3px dashed #b2bec3; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 15px; padding: 20px; margin: 15px 0 35px; transition: all 0.3s; }
    .word-pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 30px; }

    .word-card.used { opacity: 0.3; cursor: default; pointer-events: none; }
    .controls { display: flex; justify-content: center; gap: 15px; flex-wrap:wrap; }
    button { padding: 12px 30px; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }

    .reset-btn { background: #fab1a0; color: #d63031; }
    .check-btn { background: #55efc4; color: #00b894; }
    .next-btn { background: #74b9ff; color: #0984e3; }
    #feedback { margin-top: 25px; font-size: 24px; font-weight: bold; min-height: 35px; }
    #feedback .ans { display:block; font-size:18px; color:#636e72; font-weight:normal; margin-top:8px; }
    .hidden { display:none !important; }
</style>
</head>
<body>

<div class="container" id="home">
    <h1>句子重组练习</h1>
    <div class="mode-grid">
        <button class="mode-btn mode-shi" onclick="startMode('shi')">
            <span class="big">是…的句</span>
            <span class="small" id="cnt-shi"></span>
            <span class="resume" id="resume-shi"></span>
        </button>
        <button class="mode-btn mode-de" onclick="startMode('de')">
            <span class="big">补语得</span>
            <span class="small" id="cnt-de"></span>
            <span class="resume" id="resume-de"></span>
        </button>
    </div>
</div>

<div class="container hidden" id="practice">
    <div class="topbar">
        <button class="home-link" onclick="goHome()">← 回首页</button>
        <div id="q-progress"></div>
    </div>
    <h1 id="mode-title"></h1>
    <div id="answer-area" class="answer-area"></div>
    <div id="word-pool" class="word-pool"></div>
    <div id="feedback"></div>
    <div class="controls">
        <button class="reset-btn" onclick="resetCurrent()">重填 ↺</button>
        <button class="check-btn" onclick="checkAnswer()">送出答案 ✓</button>
        <button class="next-btn" onclick="nextQuestion()">下一题 ➔</button>
    </div>
</div>

const SETS = {
    shi: { name: "是…的句", data: SHI },
    de:  { name: "补语得",  data: DE }
};
document.getElementById('cnt-shi').textContent = "共 " + SHI.length + " 题";
document.getElementById('cnt-de').textContent  = "共 " + DE.length  + " 题";

const mem = {};
const Store = {
    async get(key){
        try{ if(window.storage){ const r=await window.storage.get(key); return r?r.value:null; } }catch(e){}
        try{ if(window.localStorage) return localStorage.getItem(key); }catch(e){}
        return key in mem ? mem[key] : null;
    },
    async set(key,val){
        try{ if(window.storage){ await window.storage.set(key,val); return; } }catch(e){}
        try{ if(window.localStorage){ localStorage.setItem(key,val); return; } }catch(e){}
        mem[key]=val;
    }
};
function progKey(mode){ return "rebuild:"+mode; }

let mode=null, list=[], currentIdx=0, userSelection=[];

async function refreshResume(){
    for(const m of ["shi","de"]){
        const total=SETS[m].data.length;
        const saved=parseInt(await Store.get(progKey(m)))||0;
        const el=document.getElementById('resume-'+m);
        if(saved>0 && saved<total) el.textContent="接续第 "+(saved+1)+" 题";
        else if(saved>=total)      el.textContent="已完成一轮，重新开始";
        else                       el.textContent="从第 1 题开始";
    }
}
async function startMode(m){
    mode=m; list=SETS[m].data;
    let saved=parseInt(await Store.get(progKey(m)))||0;
    if(saved>=list.length) saved=0;
    currentIdx=saved;
    document.getElementById('home').classList.add('hidden');
    document.getElementById('practice').classList.remove('hidden');
    document.getElementById('mode-title').textContent=SETS[m].name;
    loadQuestion();
}
function goHome(){
    document.getElementById('practice').classList.add('hidden');
    document.getElementById('home').classList.remove('hidden');
    refreshResume();
}
function loadQuestion(){
    const q=list[currentIdx];
    document.getElementById('q-progress').textContent="第 "+(currentIdx+1)+" 题 / 共 "+list.length+" 题";
    document.getElementById('feedback').innerHTML="";
    document.getElementById('answer-area').innerHTML="";
    userSelection=[];
    const pool=document.getElementById('word-pool'); pool.innerHTML="";
    q.w.map((w,i)=>({w,i})).sort(()=>Math.random()-0.5).forEach(({w,i})=>{
        const btn=document.createElement('div');
        btn.className='word-card'; btn.textContent=w; btn.dataset.idx=i;
        btn.onclick=()=>selectWord(w,btn);
        pool.appendChild(btn);
    });
}
function selectWord(word,poolCard){
    userSelection.push(word);
    poolCard.classList.add('used');
    const ansArea=document.getElementById('answer-area');
    const ansCard=document.createElement('div');
    ansCard.className='word-card'; ansCard.textContent=word;
    ansCard.onclick=()=>{
        const pos=userSelection.lastIndexOf(word);
        if(pos>-1) userSelection.splice(pos,1);
        ansCard.remove(); poolCard.classList.remove('used');
        document.getElementById('feedback').innerHTML="";
    };
    ansArea.appendChild(ansCard);
}
function resetCurrent(){ loadQuestion(); }
function checkAnswer(){
    const q=list[currentIdx];
    const fb=document.getElementById('feedback');
    if(userSelection.join('')===q.w.join('')){
        fb.innerHTML="太棒了！答对了 🎉<span class='ans'>"+q.s+"</span>";
        fb.style.color="#00b894";
    }else{
        fb.innerHTML="顺序不对喔，再试试看！💪";
        fb.style.color="#d63031";
    }
}
async function nextQuestion(){
    const nextIdx=(currentIdx+1)%list.length;
    await Store.set(progKey(mode), String(nextIdx===0?list.length:nextIdx));
    currentIdx=nextIdx; loadQuestion();
}
refreshResume();
